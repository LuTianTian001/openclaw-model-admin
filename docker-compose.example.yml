# 复制为 docker-compose.yml 后把下方卷改成你宿主机上的 OpenClaw 数据目录（内含 openclaw.json 与 agents/）。
# 不设 OPENCLAW_SESSIONS_PATH 时，程序会按 openclaw.json 同目录自动推导 sessions.json。
services:
  openclaw-model-admin:
    build: .
    ports:
      - "8765:8765"
    environment:
      OPENCLAW_CONFIG_PATH: /data/openclaw/openclaw.json
      # OPENCLAW_SESSIONS_PATH: /data/openclaw/agents/main/sessions/sessions.json
      # OPENCLAW_MODEL_ADMIN_SKIP_VALIDATE: "1"
    volumes:
      - /path/on/host/.openclaw:/data/openclaw:rw
